<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="w8.css">
</head>
<body>
    <h1>Contact Form</h1>
   <form action="https://formspree.io/f/mreyyjqk" method="POST">
    <label for = "fname">Name:</label>
    <input type="text" id="fname" name="fname" placeholder="Enter your full name"> <br>

    <label for = "email">Email:</label>
    <input type="email" id="email" name="email" placeholder="Enter your email address"> <br>
    
    <label for = "courses">Course Selection:</label>
    <select name="courses" id="courses">
        <option value="">Select a course</option>
        <option value="Math">Math</option>
        <option value="Science">Science</option>
        <option value="English">English</option>
        <option value="History">History</option> 
    </select><br>
    
    <label for = "reason">Reason for Contact:</label>   <br>
    <input type="radio" id="teacher" name="reason" value="teacher">
    <label for="teacher">Reach out to a teacher</label><br>
    <input type="radio" id="help" name="reason" value="help">
    <label for="help">Help Regarding School</label><br>
    <input type="radio" id="Questions?" name="reason" value="Questions?">
    <label for="Questions?">Questions?</label><br>
    <br>
    <label for = "message">Message:</label><br>
    <textarea id="message" name="message" rows="4" cols="50" placeholder="What do you need help with?"></textarea>
    <input type="submit" value="Submit">
    
   </form> 
</body>
</html>
